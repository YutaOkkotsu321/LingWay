{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}English Learning{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary:   #13141f;
      --bg-secondary: #1a1b2e;
      --bg-card:      #1e2038;
      --bg-card-hover:#252645;
      --bg-input:     #252540;
      --border:       rgba(255, 255, 255, 0.07);
      --border-hover: rgba(160, 100, 255, 0.35);

      --accent-purple: #7c3aed;
      --accent-violet: #a855f7;
      --accent-indigo: #818cf8;
      --accent-green:  #10b981;

      --text-primary:   #f1f0ff;
      --text-secondary: #9ca3af;
      --text-muted:     #6b7280;

      --grad-title: linear-gradient(135deg, #a855f7 0%, #818cf8 100%);
      --grad-btn:   linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);

      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
      --radius:      12px;
      --radius-lg:   16px;
      --radius-pill: 999px;

      --font-main:  'Sora', sans-serif;
      --font-mono:  'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font-main); cursor: pointer; border: none; outline: none; }
    input, textarea { font-family: var(--font-main); outline: none; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in-up { animation: fadeInUp 0.45s ease both; }

    /* ── AUTH SHARED ───────────────────────────────────────────── */
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-primary);
      position: relative; overflow: hidden;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 440px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      position: relative; z-index: 2;
    }
    .auth-brand {
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(129,140,248,0.15));
      padding: 32px 36px 28px;
      border-bottom: 1px solid var(--border);
    }
    .auth-brand h1 {
      font-size: 1.7rem; font-weight: 800;
      background: var(--grad-title);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-brand p { color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px; }
    .auth-body { padding: 28px 36px 36px; }
    .auth-body h2 { font-size: 1.4rem; font-weight: 700; }
    .auth-subtitle { color: var(--text-secondary); font-size: 0.88rem; margin-top: 4px; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.02em;
    }
    .field input[type=text],
    .field input[type=email],
    .field input[type=password],
    .field textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text-primary);
      font-size: 0.92rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus, .field textarea:focus {
      border-color: var(--accent-violet);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field .field-err { color: #f87171; font-size: 0.78rem; margin-top: 4px; }
    .field ul.errorlist { list-style: none; color: #f87171; font-size: 0.78rem; margin-top: 4px; }
    .field small.helptext { color: var(--text-muted); font-size: 0.75rem; margin-top: 4px; display: block; }

    .btn-primary {
      width: 100%;
      background: var(--grad-btn);
      color: #fff;
      font-size: 0.95rem; font-weight: 600;
      padding: 12px;
      border-radius: var(--radius);
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-outline {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;
      padding: 11px 24px; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: var(--accent-violet); color: var(--text-primary); }

    .btn-danger {
      background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.35);
      color: #f87171; font-size: 0.875rem; font-weight: 600;
      padding: 10px 20px; border-radius: var(--radius);
      transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.25); }

    .switch-auth {
      text-align: center; margin-top: 20px; font-size: 0.875rem; color: var(--text-secondary);
    }
    .switch-auth a { color: var(--accent-violet); font-weight: 500; }
    .switch-auth a:hover { text-decoration: underline; }

    .api-error, .form-errors {
      display: flex; align-items: center; gap: 8px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: var(--radius);
      color: #f87171;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    .success-banner {
      display: flex; align-items: center; gap: 8px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: var(--radius);
      color: var(--accent-green);
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .auth-deco { position: absolute; inset: 0; pointer-events: none; }
    .deco-circle { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25; }
    .c1 { width: 400px; height: 400px; background: var(--accent-purple); top: -200px; right: -100px; }
    .c2 { width: 300px; height: 300px; background: var(--accent-indigo); bottom: -150px; left: -80px; }
    .c3 { width: 200px; height: 200px; background: var(--accent-green); top: 50%; left: 50%; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
